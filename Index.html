<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Immersive Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0c;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
            pointer-events: none; /* Let mouse events pass through to the 3D canvas */
            background: radial-gradient(circle at center, transparent 20%, rgba(10, 10, 12, 0.8) 80%);
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #7f00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(127, 0, 255, 0.3);
        }
        p {
            font-size: 1.1rem;
            color: #8a8a93;
            max-width: 500px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="hero-content">
        <h1>Next-Gen Design</h1>
        <p>Move your mouse to interact with the environment. Immersive 3D experiences hosted entirely on GitHub static architecture.</p>
    </div>

    <!-- Include Three.js via highly reliable CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Setup Scene, Camera, and Renderer
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Soft fog gives depth to the dark environment
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.FogExp2(0x0a0a0c, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap at 2 for mobile performance
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // 2. Create the Primary 3D Object
        // A complex TorusKnot creates beautiful specular reflections
        const geometry = new THREE.TorusKnotGeometry(2, 0.6, 200, 32);
        
        // Physical material reacts exquisitely to high-end studio lighting
        const material = new THREE.MeshStandardMaterial({
            color: 0x3a0ca3,
            roughness: 0.1,
            metalness: 0.9,
            wireframe: false,
            flatShading: false
        });
        
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // 3. Studio Lighting Architecture
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        // Vibrant neon keys lights flanking the object
        const pointLight1 = new THREE.PointLight(0xff007f, 2, 50);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x00ffff, 2, 50);
        pointLight2.position.set(-5, -5, 5);
        scene.add(pointLight2);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
        directionalLight.position.set(0, 10, 0);
        scene.add(directionalLight);

        // 4. Interaction Handling (Mouse Tracking)
        let targetX = 0;
        let targetY = 0;
        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener('mousemove', (event) => {
            // Normalize values between -0.5 and 0.5
            mouseX = (event.clientX / window.innerWidth) - 0.5;
            mouseY = (event.clientY / window.innerHeight) - 0.5;
        });

        // 5. Responsive Resize Handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 6. Animation Loop
        const clock = new THREE.Clock();

        const animate = () => {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Constant gentle rotation
            mesh.rotation.x = elapsedTime * 0.2;
            mesh.rotation.y = elapsedTime * 0.3;

            // Fluid lerping (linear interpolation) for mouse interactions
            targetX = mouseX * 2;
            targetY = mouseY * 2;
            
            mesh.position.x += (targetX - mesh.position.x) * 0.05;
            mesh.position.y += (-targetY - mesh.position.y) * 0.05;

            // Subtle rhythmic scaling to make the object feel "alive"
            const scaleFactor = 1 + Math.sin(elapsedTime * 1.5) * 0.08;
            mesh.scale.set(scaleFactor, scaleFactor, scaleFactor);

            renderer.render(scene, camera);
        };

        animate();
    </script>
</body>
</html>
